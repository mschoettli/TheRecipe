<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TheRecipe{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <script src="{{ url_for('static', path='/app.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">TR</span>
        <span>TheRecipe</span>
      </a>
      <nav class="nav">
        <a href="/">Library</a>
        <a href="/imports/new">Import</a>
        <a class="button button-primary" href="/recipes/new">New recipe</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
