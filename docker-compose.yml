services:
  app:
    container_name: therecipe-app
    image: ghcr.io/mschoettli/therecipe:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://therecipe:change-me@postgres:5432/therecipe}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-to-a-long-random-value}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: therecipe-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-therecipe}
      POSTGRES_USER: ${POSTGRES_USER:-therecipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  watchtower:
    container_name: therecipe-watchtower
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "300"
